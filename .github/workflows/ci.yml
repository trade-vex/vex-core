name: Vex Core CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redpanda:
        image: redpandadata/redpanda:v25.3.1
        ports:
          - 9092:9092
        options: >-
          --health-cmd "rpk cluster health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install mold linker
        run: |
          wget https://github.com/rui314/mold/releases/download/v2.35.1/mold-2.35.1-x86_64-linux.tar.gz
          sudo tar -xzf mold-2.35.1-x86_64-linux.tar.gz -C /usr/local --strip-components=1
          rm mold-2.35.1-x86_64-linux.tar.gz

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-build"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl pkg-config libssl-dev uuid-dev ca-certificates make gcc g++ clang zlib1g-dev libbsd-dev python3-pip default-jdk protobuf-compiler
          # Install CMake 3.30+ (required by rusteron)
          pip3 install cmake --upgrade --break-system-packages || pip3 install cmake --upgrade
          cmake --version

      - name: Build workspace
        run: cargo build --workspace
        env:
          RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=mold"

      - name: Build workspace (release)
        run: cargo build --workspace --release --all-features --all-targets
        env:
          RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=mold"

      - name: Run tests
        run: cargo test --workspace --all-features --all-targets
        env:
          RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=mold"
          VEX_KAFKA_BROKER: localhost:9092
          VEX_REDIS_URL: redis://localhost:6379
          VEX_ENV: dev

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Enforce formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mold linker
        run: |
          wget https://github.com/rui314/mold/releases/download/v2.35.1/mold-2.35.1-x86_64-linux.tar.gz
          sudo tar -xzf mold-2.35.1-x86_64-linux.tar.gz -C /usr/local --strip-components=1
          rm mold-2.35.1-x86_64-linux.tar.gz

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-build"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl pkg-config libssl-dev uuid-dev ca-certificates make gcc g++ clang zlib1g-dev libbsd-dev python3-pip default-jdk protobuf-compiler
          # Install CMake 3.30+ (required by rusteron)
          pip3 install cmake --upgrade --break-system-packages || pip3 install cmake --upgrade
          cmake --version

      - name: Linting
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings -A clippy::missing_errors_doc -A clippy::missing_panics_doc -A clippy::must_use_candidate -A clippy::default_trait_access -A clippy::ignored_unit_patterns -A clippy::module_name_repetitions -A clippy::cast_possible_truncation
        env:
          RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=mold"

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redpanda:
        image: redpandadata/redpanda:v25.3.1
        ports:
          - 9092:9092
        options: >-
          --health-cmd "rpk cluster health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl pkg-config libssl-dev uuid-dev ca-certificates make gcc g++ clang zlib1g-dev libbsd-dev python3-pip default-jdk protobuf-compiler
          # Install CMake 3.30+ (required by rusteron)
          pip3 install cmake --upgrade --break-system-packages || pip3 install cmake --upgrade
          cmake --version
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - name: Generate code coverage
        run: |
          cargo llvm-cov --workspace --all-features --all-targets --exclude rusteron_client --text
        env:
          VEX_KAFKA_BROKER: localhost:9092
          VEX_REDIS_URL: redis://localhost:6379
          VEX_ENV: dev

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run security audit
        run: cargo audit --deny warnings

  xtask-tests:
    name: End-to-end tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl pkg-config libssl-dev uuid-dev ca-certificates make gcc g++ clang zlib1g-dev libbsd-dev python3-pip default-jdk protobuf-compiler
          # Install CMake 3.30+ (required by rusteron)
          pip3 install cmake --upgrade --break-system-packages || pip3 install cmake --upgrade
          cmake --version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Cache Docker layers for faster rebuilds
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Verify Docker is available
        run: |
          # Docker should already be running on GitHub Actions runners
          # This just verifies it's available
          docker info

      - name: Build Aeron and Docker images
        run: |
          # Use buildx cache for faster builds
          export DOCKER_BUILDKIT=1
          export BUILDX_CACHE_FROM="type=local,src=/tmp/.buildx-cache"
          export BUILDX_CACHE_TO="type=local,dest=/tmp/.buildx-cache-new,mode=max"

          output=$(docker compose --project-directory ./xtask/tests --file ./xtask/tests/docker-compose.yml up media-driver --build)
          echo "$output"
          output=$(cargo xtask build-docker)
          echo "$output"
          if ! echo "$output" | grep -q "Docker images built successfully."; then
            echo "Docker image build failed!"
            exit 1
          fi

      - name: Run xtask unit tests
        run: cargo test --package xtask --lib

      - name: Run e2e tests
        run: cargo xtask test e2e --all

      - name: Run integration tests
        run: cargo xtask test integration --fail-fast
        env:
          VEX_ENV: dev

      # Temp fix for cache growth - https://github.com/docker/build-push-action/issues/252
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

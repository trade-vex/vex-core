syntax = "proto3";

package trading;

// Enum for Order Side
enum Side {
  SIDE_UNSPECIFIED = 0;
  SIDE_BID = 1;
  SIDE_ASK = 2;
}

// Enum for Time In Force
enum TimeInForce {
  TIF_UNSPECIFIED = 0;
  TIF_GTC = 1;
  TIF_IOC = 2;
  TIF_FOK = 3;
}

// Enum for Status
enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_REJECTED = 1;
  STATUS_PLACED = 2;
  STATUS_CANCELLED = 3;
  STATUS_PARTIALLY_FILLED = 4;
  STATUS_FILLED = 5;
  STATUS_PROCESSING = 6;
  STATUS_PROCESSED = 7;
}

// Common Order Structure
message Order {
  uint64 order_id = 1;
  uint64 user_id = 2;
  uint64 price = 3;
  uint64 size = 4;
  Side side = 5;
  TimeInForce time_in_force = 6;
  Status status = 7;
  uint64 timestamp = 8;
}

// ---------------- EVENTS ---------------- //

message OrderEvent {
  Order order = 1;
  uint32 market_id = 2;
}

message TradeEvent {
  uint64 maker_user_id = 1;
  uint64 taker_user_id = 2;
  uint32 market_id = 3;
  uint64 price = 4;
  uint64 size = 5;
  uint64 maker_order_id = 6;
  uint64 taker_order_id = 7;
  Side taker_side = 8;
  uint64 timestamp = 9;
}

message BalanceEvent {
  uint64 user_id = 1;
  uint32 asset_id = 2; // changed u16 to uint32 (proto doesn't have uint16)
  uint64 available = 3;
  uint64 locked = 4;
  uint64 total = 5;
  uint64 timestamp = 6;
}

message OrderbookLevel {
  uint64 price = 1;
  uint64 size = 2;
}

message OrderbookEvent {
  uint32 market_id = 1;
  string bids = 2; // JSON String: "[{\"price\":100, \"size\":10}, ...]"
  string asks = 3; // JSON String
  uint64 timestamp = 4;
}

message CancelOrderEvent {
  uint64 order_id = 1;
  uint32 market_id = 2;
  uint64 user_id = 3;
  uint64 timestamp = 4;
}

message DepositEvent {
  uint64 user_id = 1;
  uint32 asset_id = 2;
  uint64 amount = 3;
  uint64 timestamp = 4;
}

message WithdrawEvent {
  uint64 user_id = 1;
  uint32 asset_id = 2;
  uint64 amount = 3;
  uint64 timestamp = 4;
}


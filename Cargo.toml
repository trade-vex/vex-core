[package]
name = "vex-core"
version = "0.1.0"
edition = "2024"

[workspace]
resolver = "2"
members = [
    "common", 
    "networking",
    "orderbook", 
    "processors", 
    "server", 
    "vex-config",
    "utils",
]

[workspace.dependencies]
common = { path = "./common" }
vex-config = { path = "./vex-config" }
vex-networking = { path = "./networking" }
processors = { path = "./processors" }
orderbook = { path = "./orderbook" }
utils = { path = "./utils" }
borsh = { version = "1.5.7", default-features = false, features = ["hashbrown", "derive", "de_strict_order"] }
hashbrown = "0.15.4"
thiserror = "2.0.12"
rusteron-client = "0.1.143"
rusteron-media-driver = "0.1.143"
tracing = "0.1.41"
disruptor = "3.4.0"

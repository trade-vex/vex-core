services:
  redis:
    image: redis:7-alpine
    container_name: vex-redis
    ports:
      - "6379:6379"
    networks:
      - vex-testing-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    hostname: zookeeper
    container_name: vex-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - vex-testing-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    hostname: kafka
    container_name: vex-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - vex-testing-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  media-driver:
    build:
      context: .
      dockerfile: media-driver.Dockerfile
    container_name: media-driver
    volumes:
      - ./bin/:/output
    # This service runs once to generate code, then exits
    restart: "no"

  vex-server:
    build:
      context: ../../
      dockerfile: xtask/tests/server.Dockerfile
    container_name: vex-server
    depends_on:
      media-driver:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - VEX_SERVER_HOST=vex-server
      - VEX_SERVER_PORT=3521
      - VEX_KAFKA_BROKER=kafka:9092
      - VEX_REDIS_URL=redis://redis:6379
      - AERON_DIR=/dev/shm/aeron-test-server
      - AERON_RESERVED_SESSION_ID_LOW=1
      - AERON_RESERVED_SESSION_ID_HIGH=2147483647
      - LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
      - RUST_LOG=debug
    ipc: shareable # Allows aeronmd and test_server to share memory.
    privileged: true
    shm_size: '512m'
    volumes:
      - ./test-results:/results
    networks:
      vex-testing-net:
        ipv4_address: 172.28.1.10

  vex-client:
    build:
      context: ../../
      dockerfile: ./xtask/tests/client.Dockerfile
    # container_name: vex-client
    depends_on:
      media-driver:
        condition: service_completed_successfully
    environment:
      # Config for the client to find the server.
      - VEX_SERVER_HOST=vex-server
      - VEX_SERVER_PORT=3521
      - AERON_DIR=/dev/shm/aeron-test-client
      - LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
      - RUST_LOG=debug
    ipc: shareable
    privileged: true
    shm_size: '512m'
    volumes:
      - ./test-results:/results
    networks:
      - vex-testing-net

networks:
  vex-testing-net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
